<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1440px;
  background: #0D1117;
  font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #E6EDF3;
  overflow: hidden;
  position: relative;
}

/* Subtle grid background */
body::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(48, 54, 61, 0.3) 1px, transparent 1px),
    linear-gradient(90deg, rgba(48, 54, 61, 0.3) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 0;
}

/* Glow accent */
.glow {
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  z-index: 0;
}
.glow-1 { background: #F97316; top: -100px; right: -100px; }
.glow-2 { background: #8B5CF6; bottom: -100px; left: -100px; }

.content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 60px;
  padding: 80px;
  text-align: center;
}

.badge {
  background: linear-gradient(135deg, #F97316, #EA580C);
  color: white;
  font-size: 32px;
  font-weight: 700;
  padding: 14px 40px;
  border-radius: 50px;
  letter-spacing: 2px;
}

.title {
  font-size: 80px;
  font-weight: 900;
  line-height: 1.3;
  max-width: 900px;
}

.title .highlight {
  color: #F97316;
}

.title .highlight2 {
  color: #8B5CF6;
}

.divider {
  width: 120px;
  height: 4px;
  background: linear-gradient(90deg, #F97316, #8B5CF6);
  border-radius: 2px;
}

.subtitle {
  font-size: 40px;
  color: #8B949E;
  line-height: 1.6;
  max-width: 800px;
}

.terminal {
  background: #161B22;
  border: 1px solid #30363D;
  border-radius: 16px;
  padding: 30px 50px;
  font-family: "SF Mono", "Fira Code", monospace;
  font-size: 36px;
  color: #7EE787;
  display: flex;
  align-items: center;
  gap: 16px;
}

.terminal .prompt {
  color: #8B949E;
}

.footer {
  position: absolute;
  bottom: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 28px;
  color: #484F58;
  z-index: 1;
}
</style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="content">
    <div class="badge">独立开发者日常</div>

    <div class="title">
      让 <span class="highlight">Claude Code</span><br>
      自动处理你的 <span class="highlight2">PR</span>
    </div>

    <div class="divider"></div>

    <div class="subtitle">
      我还在搭 OpenClaw 工作流<br>
      结果官方直接出了这个功能 🫠
    </div>

    <div class="terminal">
      <span class="prompt">$</span> claude /loop "babysit all my PRs"
    </div>
  </div>

  <div class="footer">@李志伟 · Claude Code</div>
</body>
</html>
